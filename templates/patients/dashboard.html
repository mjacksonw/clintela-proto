<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard - Clintela</title>
</head>
<body>
    <h1>Patient Dashboard</h1>
    {% if patient %}
        <p>Welcome, {{ patient.user.get_full_name|default:patient.user.username }}</p>
        <p>Hospital: {{ patient.hospital.name }}</p>
        <p>Date of Birth: {{ patient.date_of_birth }}</p>
    {% else %}
        <p>No patient information available.</p>
    {% endif %}
</body>
</html>
