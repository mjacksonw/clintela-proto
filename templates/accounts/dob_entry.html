{% extends "base.html" %}

{% block title %}Verify Your Identity — Clintela{% endblock %}

{% block body %}
<div class="min-h-screen flex flex-col items-center justify-center px-4"
     style="background-color: var(--color-bg);">

    <div class="w-full max-w-sm">
        <!-- Card -->
        <div class="rounded-lg border p-6"
             style="background-color: var(--color-surface); border-color: var(--color-border);">

            <h1 class="text-xl font-semibold mb-1" style="color: var(--color-text);">
                Welcome to Clintela
            </h1>

            <!-- Verified code badge -->
            <div class="flex items-center gap-2 mb-6">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Code verified: {{ code }}
                </span>
            </div>

            {% if error %}
            <div class="mb-4 px-3 py-2 rounded-lg text-sm" style="background-color: #FEE2E2; color: #991B1B;">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'accounts:verify_dob' %}">
                {% csrf_token %}

                <label for="dob" class="block text-sm font-medium mb-2" style="color: var(--color-text);">
                    Please enter your date of birth
                </label>

                <input type="text"
                       id="dob"
                       name="dob"
                       placeholder="MM/DD/YYYY"
                       required
                       autocomplete="bday"
                       class="w-full px-4 py-3 rounded-lg border text-base transition-colors
                              focus:border-primary focus:ring-0 focus:outline-none"
                       style="background-color: var(--color-bg);
                              border-color: var(--color-border);
                              color: var(--color-text);
                              height: 48px; font-size: 16px;">

                <button type="submit"
                        class="w-full mt-4 px-4 py-3 rounded-lg text-white font-medium text-base
                               transition-colors hover:opacity-90"
                        style="background-color: var(--color-primary); height: 48px;">
                    Continue
                </button>
            </form>
        </div>

        <p class="text-center text-sm mt-4" style="color: var(--color-text-secondary);">
            Code doesn't match your leaflet?
            <a href="{% url 'accounts:start' %}" class="underline hover:no-underline" style="color: var(--color-primary);">
                Try again
            </a>
        </p>
    </div>
</div>
{% endblock %}
