{% extends "base.html" %}
{% load static %}

{% block body %}
<div x-data="{
        sidebarOpen: window.innerWidth >= 1024,
        mobileOverlay: false,
        tabletExpanded: false,

        get showSidebar() {
            if (window.innerWidth < 768) return false;
            if (window.innerWidth < 1024) return this.tabletExpanded;
            return true;
        },

        openMobileChat() {
            this.mobileOverlay = true;
            history.pushState({ chatOpen: true }, '');
            this.$nextTick(() => {
                const closeBtn = document.getElementById('mobile-chat-close');
                if (closeBtn) closeBtn.focus();
            });
        },

        closeMobileChat() {
            this.mobileOverlay = false;
            this.$nextTick(() => {
                const fab = document.getElementById('chat-fab');
                if (fab) fab.focus();
            });
        }
     }"
     @popstate.window="mobileOverlay = false"
     @keydown.escape.window="if (mobileOverlay) closeMobileChat()"
     class="min-h-screen flex flex-col">

    {% include "components/_header.html" %}

    <div class="flex flex-1 overflow-hidden" style="height: calc(100vh - 64px);">

        <!-- Chat sidebar — desktop (always visible) + tablet (collapsible) -->
        <aside role="complementary"
               aria-label="Chat with your care team"
               class="hidden md:flex flex-col border-r flex-shrink-0 transition-all duration-300 ease-out"
               style="background-color: var(--color-surface); border-color: var(--color-border);"
               :class="showSidebar ? 'w-[360px]' : 'w-16'">

            <!-- Collapsed tablet state — icon only -->
            <template x-if="!showSidebar && window.innerWidth >= 768">
                <button @click="tabletExpanded = true"
                        class="flex items-center justify-center w-full h-full hover:bg-warm-50"
                        aria-label="Open chat sidebar"
                        title="Open chat">
                    <i data-lucide="message-circle" class="w-6 h-6 text-secondary"></i>
                </button>
            </template>

            <!-- Expanded sidebar content -->
            <template x-if="showSidebar">
                <div class="flex flex-col h-full w-[360px]">
                    {% include "components/_chat_sidebar.html" %}
                </div>
            </template>
        </aside>

        <!-- Mobile chat overlay -->
        <div x-show="mobileOverlay"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="translate-y-full"
             x-transition:enter-end="translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="translate-y-0"
             x-transition:leave-end="translate-y-full"
             class="md:hidden fixed inset-0 z-50 flex flex-col"
             style="background-color: var(--color-surface);"
             role="dialog"
             aria-modal="true"
             aria-label="Chat"
             x-cloak>

            <!-- Mobile chat header -->
            <div class="flex items-center justify-between px-4 h-14 border-b flex-shrink-0"
                 style="border-color: var(--color-border);">
                <span class="font-semibold" style="color: var(--color-text);">Chat</span>
                <button id="mobile-chat-close"
                        @click="closeMobileChat()"
                        class="p-2.5 rounded-lg"
                        aria-label="Close chat">
                    <i data-lucide="x" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
                </button>
            </div>

            <!-- Mobile chat content -->
            <div class="flex flex-col flex-1 overflow-hidden">
                {% include "components/_chat_sidebar.html" %}
            </div>
        </div>

        <!-- Dashboard content area -->
        <main role="main"
              id="main-content"
              tabindex="-1"
              aria-label="Recovery dashboard"
              class="flex-1 overflow-y-auto"
              style="background-color: var(--color-bg);">
            <div class="max-w-patient mx-auto px-4 md:px-6 py-6 md:py-8 pb-24 md:pb-8">
                {% block dashboard_content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Mobile FAB — chat button -->
    <button id="chat-fab"
            @click="openMobileChat()"
            x-show="!mobileOverlay"
            class="md:hidden fixed bottom-4 right-4 z-40 w-14 h-14 rounded-full bg-primary text-white
                   shadow-lg flex items-center justify-center
                   hover:bg-primary-700 active:scale-95 transition-all"
            aria-label="Open chat">
        <i data-lucide="message-circle" class="w-6 h-6"></i>
    </button>

    <!-- Tablet collapse button (when expanded) -->
    <button x-show="tabletExpanded && window.innerWidth >= 768 && window.innerWidth < 1024"
            @click="tabletExpanded = false"
            class="hidden md:block lg:hidden fixed bottom-4 left-[368px] z-40 w-10 h-10 rounded-full
                   shadow-md flex items-center justify-center"
            style="background-color: var(--color-surface); border: 1px solid var(--color-border);"
            aria-label="Collapse chat sidebar"
            x-cloak>
        <i data-lucide="panel-left-close" class="w-4 h-4" style="color: var(--color-text-secondary);"></i>
    </button>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/chat.js' %}"></script>
{% endblock %}
