<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clintela - AI-Powered Patient Recovery</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #0d9488;
        }
        .tagline {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .status {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .status-badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            color: #0d9488;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        .version {
            position: absolute;
            bottom: 1rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clintela</h1>
        <p class="tagline">AI-powered post-surgical patient recovery support</p>
        
        <div class="status">
            <span class="status-badge">Server Running</span>
            <p style="margin-top: 1rem; color: #64748b;">
                Django is configured and ready for development.
            </p>
        </div>
        
        <div class="links">
            <a href="/admin/">Admin Panel</a>
            <span>|</span>
            <a href="https://github.com/your-org/clintela">Documentation</a>
        </div>
    </div>
    
    <div class="version">
        Version 0.1.0 | Django 5.1 | Python 3.12
    </div>
</body>
</html>
