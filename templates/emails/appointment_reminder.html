<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Reminder</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff;">
        <tr>
            <td style="padding: 32px 24px; text-align: center; background-color: #0D9488;">
                <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 700;">
                    Appointment Reminder
                </h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 32px 24px;">
                <p style="margin: 0 0 16px; font-size: 16px; color: #374151;">
                    Hi {{ patient_name }},
                </p>
                <p style="margin: 0 0 24px; font-size: 16px; color: #374151;">
                    {{ reminder_message }}
                </p>

                <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                       style="background-color: #f9fafb; border-radius: 8px; margin-bottom: 24px;">
                    <tr>
                        <td style="padding: 20px;">
                            <p style="margin: 0 0 8px; font-size: 14px; color: #6b7280; font-weight: 600;">
                                {{ appointment_type }}
                            </p>
                            <p style="margin: 0 0 4px; font-size: 18px; color: #111827; font-weight: 600;">
                                {{ appointment_date }}
                            </p>
                            <p style="margin: 0 0 12px; font-size: 16px; color: #111827;">
                                {{ appointment_time }}
                            </p>
                            <p style="margin: 0; font-size: 14px; color: #6b7280;">
                                with {{ clinician_name }}
                            </p>
                        </td>
                    </tr>
                </table>

                {% if virtual_visit_url %}
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 24px;">
                    <tr>
                        <td style="text-align: center;">
                            <a href="{{ virtual_visit_url }}"
                               style="display: inline-block; padding: 14px 32px; background-color: #7C3AED; color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px;">
                                Join Video Call
                            </a>
                        </td>
                    </tr>
                </table>
                {% endif %}
            </td>
        </tr>
        <tr>
            <td style="padding: 24px; text-align: center; background-color: #f9fafb; border-top: 1px solid #e5e7eb;">
                <p style="margin: 0; font-size: 12px; color: #9ca3af;">
                    Clintela — Your Care Team
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
