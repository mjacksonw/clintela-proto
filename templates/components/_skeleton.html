<!-- Skeleton loading placeholders -->
{% if variant == "message" or variant == "messages" %}
<div class="space-y-4 animate-pulse" aria-hidden="true">
    <!-- Agent message skeleton -->
    <div class="flex justify-start">
        <div class="max-w-[75%]">
            <div class="h-3 w-20 rounded mb-2" style="background-color: var(--color-border);"></div>
            <div class="rounded-2xl p-4 space-y-2" style="background-color: var(--color-border); opacity: 0.5;">
                <div class="h-3 w-48 rounded" style="background-color: var(--color-border);"></div>
                <div class="h-3 w-36 rounded" style="background-color: var(--color-border);"></div>
            </div>
        </div>
    </div>
    <!-- User message skeleton -->
    <div class="flex justify-end">
        <div class="max-w-[65%]">
            <div class="rounded-2xl p-4" style="background-color: var(--color-primary); opacity: 0.3;">
                <div class="h-3 w-32 rounded" style="background-color: rgba(255,255,255,0.3);"></div>
            </div>
        </div>
    </div>
    <!-- Another agent message -->
    <div class="flex justify-start">
        <div class="max-w-[70%]">
            <div class="h-3 w-16 rounded mb-2" style="background-color: var(--color-border);"></div>
            <div class="rounded-2xl p-4 space-y-2" style="background-color: var(--color-border); opacity: 0.5;">
                <div class="h-3 w-44 rounded" style="background-color: var(--color-border);"></div>
                <div class="h-3 w-52 rounded" style="background-color: var(--color-border);"></div>
                <div class="h-3 w-28 rounded" style="background-color: var(--color-border);"></div>
            </div>
        </div>
    </div>
</div>
{% elif variant == "card" %}
<div class="rounded-lg border p-6 animate-pulse" aria-hidden="true"
     style="border-color: var(--color-border);">
    <div class="h-4 w-32 rounded mb-4" style="background-color: var(--color-border);"></div>
    <div class="space-y-3">
        <div class="h-3 w-full rounded" style="background-color: var(--color-border); opacity: 0.5;"></div>
        <div class="h-3 w-3/4 rounded" style="background-color: var(--color-border); opacity: 0.5;"></div>
        <div class="h-3 w-1/2 rounded" style="background-color: var(--color-border); opacity: 0.5;"></div>
    </div>
</div>
{% endif %}
