{% load i18n %}
<!-- Persona profile card modal.
     Desktop: centered panel. Mobile: bottom sheet.
     Data comes from profileCardPersona set by openProfileCard(). -->

<template x-if="showProfileCard && profileCardPersona">
    <div class="fixed inset-0 z-50" @keydown.escape.window="closeProfileCard()">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/40" @click="closeProfileCard()"></div>

        <!-- Desktop: centered panel -->
        <div class="hidden md:flex items-center justify-center absolute inset-0 pointer-events-none">
            <div class="w-full max-w-sm mx-auto rounded-lg pointer-events-auto relative"
                 style="background-color: var(--color-surface);"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 @click.stop>

                <!-- Close button -->
                <button type="button" @click="closeProfileCard()"
                        class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center transition-colors"
                        style="color: var(--color-text-secondary);"
                        aria-label="{% trans 'Close' %}">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>

                <!-- Content -->
                <div class="px-6 py-8 text-center">
                    <!-- Avatar -->
                    <div class="w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold text-white mx-auto"
                         :style="'background-color: ' + profileCardPersona.avatar_color">
                        <span x-text="profileCardPersona.avatar_initials"></span>
                    </div>

                    <!-- Name -->
                    <h3 class="text-xl font-semibold mt-3" style="color: var(--color-text);"
                        x-text="profileCardPersona.name"></h3>

                    <!-- AI badge -->
                    <span class="text-xs font-medium uppercase tracking-wide px-2 py-1 rounded-full inline-block mt-1.5"
                          style="background: rgba(13, 148, 136, 0.1); color: #0D9488;">
                        {% trans "AI Support Companion" %}
                    </span>

                    <!-- Bio -->
                    <div class="mt-4 text-sm text-left space-y-2" style="color: var(--color-text-secondary);">
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Age:" %}</span> <span x-text="profileCardPersona.age"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Background:" %}</span> <span x-text="profileCardPersona.background"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Procedure:" %}</span> <span x-text="profileCardPersona.procedure"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Recovery:" %}</span> <span x-text="profileCardPersona.months_post_op + ' months post-op'"></span></p>
                    </div>

                    <!-- Role description -->
                    <p class="mt-4 text-sm" style="color: var(--color-text-secondary);"
                       x-text="profileCardPersona.therapeutic_role"></p>
                </div>
            </div>
        </div>

        <!-- Mobile: bottom sheet -->
        <div class="md:hidden absolute inset-x-0 bottom-0 pointer-events-auto"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="translate-y-full"
             x-transition:enter-end="translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="translate-y-0"
             x-transition:leave-end="translate-y-full"
             @click.stop>
            <div class="rounded-t-xl" style="background-color: var(--color-surface);">
                <!-- Drag handle -->
                <div class="flex justify-center pt-3 pb-1">
                    <div class="w-10 h-1 rounded-full" style="background: var(--color-border);"></div>
                </div>

                <!-- Content (same as desktop) -->
                <div class="px-6 py-6 text-center">
                    <div class="w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold text-white mx-auto"
                         :style="'background-color: ' + profileCardPersona.avatar_color">
                        <span x-text="profileCardPersona.avatar_initials"></span>
                    </div>

                    <h3 class="text-xl font-semibold mt-3" style="color: var(--color-text);"
                        x-text="profileCardPersona.name"></h3>

                    <span class="text-xs font-medium uppercase tracking-wide px-2 py-1 rounded-full inline-block mt-1.5"
                          style="background: rgba(13, 148, 136, 0.1); color: #0D9488;">
                        {% trans "AI Support Companion" %}
                    </span>

                    <div class="mt-4 text-sm text-left space-y-2" style="color: var(--color-text-secondary);">
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Age:" %}</span> <span x-text="profileCardPersona.age"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Background:" %}</span> <span x-text="profileCardPersona.background"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Procedure:" %}</span> <span x-text="profileCardPersona.procedure"></span></p>
                        <p><span class="font-medium" style="color: var(--color-text);">{% trans "Recovery:" %}</span> <span x-text="profileCardPersona.months_post_op + ' months post-op'"></span></p>
                    </div>

                    <p class="mt-4 text-sm" style="color: var(--color-text-secondary);"
                       x-text="profileCardPersona.therapeutic_role"></p>

                    <!-- Safe area padding for mobile -->
                    <div class="h-6"></div>
                </div>
            </div>
        </div>
    </div>
</template>
