<!-- Patient header — sticky, 64px height -->
<header role="banner"
        class="sticky top-0 z-40 h-16 flex items-center justify-between px-4 lg:px-6
               border-b"
        style="background-color: var(--color-surface); border-color: var(--color-border);"
        x-data="{ soundEnabled: localStorage.getItem('clintela-sound') !== 'muted' }">

    <!-- Left: Clintela wordmark -->
    <a href="/" class="flex items-center gap-2 no-underline py-2">
        <span class="text-xl font-bold tracking-tight text-secondary" style="letter-spacing: -0.02em;">
            Clintela
        </span>
    </a>

    <!-- Right: patient name + icon group -->
    <div class="flex items-center gap-3">
        <!-- Patient name (hidden on mobile) -->
        {% if patient %}
        <span class="hidden md:block text-sm font-medium" style="color: var(--color-text-secondary);">
            {{ patient.user.first_name }}
        </span>
        {% endif %}

        <!-- Notification bell -->
        {% if patient %}
        <div class="relative"
             x-data="notificationBell()"
             data-patient-id="{{ patient.id }}"
             x-on:keydown.escape="open = false">
            <button @click="open = !open"
                    class="p-3 rounded-lg transition-colors hover:bg-warm-100 [data-theme='dark']:hover:bg-warm-800 relative
                           focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:outline-none"
                    :aria-label="bellLabel"
                    aria-haspopup="true"
                    :aria-expanded="open">
                <i data-lucide="bell" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
                <span x-show="unreadCount > 0"
                      x-text="badgeText"
                      class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-danger text-white text-[10px] font-bold flex items-center justify-center"
                      x-cloak></span>
            </button>

            <!-- Dropdown — desktop -->
            <div x-show="open"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-100"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="hidden md:block absolute right-0 top-full mt-2 w-80 rounded-lg shadow-lg border overflow-hidden"
                 style="background-color: var(--color-surface); border-color: var(--color-border);"
                 role="menu"
                 x-cloak>
                <!-- Header -->
                <div class="px-4 py-3 border-b flex items-center justify-between"
                     style="border-color: var(--color-border);">
                    <span class="text-sm font-semibold" style="color: var(--color-text);">Notifications</span>
                    <button x-show="unreadCount > 0"
                            @click="markAllRead()"
                            class="text-xs font-medium"
                            style="color: var(--color-primary);">
                        Mark all read
                    </button>
                </div>
                <!-- List -->
                <div class="max-h-96 overflow-y-auto">
                    <template x-if="notifications.length === 0">
                        <div class="px-4 py-8 text-center">
                            <i data-lucide="bell-off" class="w-6 h-6 mx-auto mb-2" style="color: var(--color-text-secondary);"></i>
                            <p class="text-sm" style="color: var(--color-text-secondary);">All caught up!</p>
                        </div>
                    </template>
                    <template x-for="n in notifications" :key="n.id">
                        <div @click="markRead(n.id)"
                             class="px-4 py-3 border-b cursor-pointer transition-colors"
                             :class="!n.is_read ? 'bg-primary-50/50 [data-theme=\'dark\']:bg-primary-900/20' : ''"
                             :style="!n.is_read ? 'border-left: 3px solid ' + severityColor(n.severity) : 'border-color: var(--color-border)'"
                             role="menuitem">
                            <p class="text-sm font-medium" style="color: var(--color-text);" x-text="n.title"></p>
                            <p class="text-xs mt-0.5 line-clamp-2" style="color: var(--color-text-secondary);" x-text="n.message"></p>
                            <p class="text-xs mt-1" style="color: var(--color-text-secondary);" x-text="timeAgo(n.created_at)"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Bottom sheet — mobile -->
            <template x-teleport="body">
                <div x-show="open"
                     class="md:hidden fixed inset-0 z-50"
                     x-cloak>
                    <div class="absolute inset-0 bg-black/30" @click="open = false"></div>
                    <div x-show="open"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="translate-y-full"
                         x-transition:enter-end="translate-y-0"
                         x-transition:leave="transition ease-in duration-200"
                         x-transition:leave-start="translate-y-0"
                         x-transition:leave-end="translate-y-full"
                         class="fixed bottom-0 left-0 right-0 rounded-t-xl max-h-[70vh] overflow-y-auto"
                         style="background-color: var(--color-surface);">
                        <div class="px-4 py-3 border-b flex items-center justify-between"
                             style="border-color: var(--color-border);">
                            <span class="text-sm font-semibold" style="color: var(--color-text);">Notifications</span>
                            <button @click="open = false" class="p-2" aria-label="Close notifications">
                                <i data-lucide="x" class="w-4 h-4" style="color: var(--color-text-secondary);"></i>
                            </button>
                        </div>
                        <template x-if="notifications.length === 0">
                            <div class="px-4 py-8 text-center">
                                <i data-lucide="bell-off" class="w-6 h-6 mx-auto mb-2" style="color: var(--color-text-secondary);"></i>
                                <p class="text-sm" style="color: var(--color-text-secondary);">All caught up!</p>
                            </div>
                        </template>
                        <template x-for="n in notifications" :key="n.id">
                            <div @click="markRead(n.id)"
                                 class="px-4 py-3 border-b"
                                 :class="!n.is_read ? 'bg-primary-50/50' : ''"
                                 :style="!n.is_read ? 'border-left: 3px solid ' + severityColor(n.severity) : 'border-color: var(--color-border)'">
                                <p class="text-sm font-medium" style="color: var(--color-text);" x-text="n.title"></p>
                                <p class="text-xs mt-0.5 line-clamp-2" style="color: var(--color-text-secondary);" x-text="n.message"></p>
                                <p class="text-xs mt-1" style="color: var(--color-text-secondary);" x-text="timeAgo(n.created_at)"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
        {% endif %}

        <!-- Sound toggle -->
        <button @click="soundEnabled = !soundEnabled; localStorage.setItem('clintela-sound', soundEnabled ? 'enabled' : 'muted')"
                class="p-3 rounded-lg transition-colors hover:bg-warm-100 [data-theme='dark']:hover:bg-warm-800"
                :aria-label="soundEnabled ? 'Mute notifications' : 'Unmute notifications'"
                title="Toggle notification sound">
            <template x-if="soundEnabled">
                <i data-lucide="volume-2" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
            </template>
            <template x-if="!soundEnabled">
                <i data-lucide="volume-x" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
            </template>
        </button>

        <!-- Dark mode toggle -->
        <button @click="window.clintelaTheme.toggle(); $nextTick(() => { if (window.lucide) lucide.createIcons(); })"
                class="p-3 rounded-lg transition-colors hover:bg-warm-100 [data-theme='dark']:hover:bg-warm-800"
                aria-label="Toggle dark mode"
                title="Toggle dark mode">
            <i data-lucide="sun" class="w-5 h-5 hidden [data-theme='dark']:block" style="color: var(--color-text-secondary);"></i>
            <i data-lucide="moon" class="w-5 h-5 block [data-theme='dark']:hidden" style="color: var(--color-text-secondary);"></i>
        </button>
    </div>
</header>
