{% load i18n %}
<!-- Post-onboarding empty state: persona grid with conversation starters -->

<div class="flex flex-col items-center px-4 py-6 space-y-4">
    <h3 class="text-xl font-semibold" style="color: var(--color-text);">
        {% trans "Your support group is here" %}
    </h3>

    <!-- Persona mini-cards with tap-to-prefill (starters live in support-group.js — SG_STARTERS) -->
    <div class="grid grid-cols-2 gap-2 w-full max-w-sm">
        <button type="button" @click="prefillStarter('maria')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #8B5CF6;">MG</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Maria</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "How are you holding up?" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('james')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #0891B2;">JW</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">James</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "What should I expect?" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('linda')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #059669;">LK</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Linda</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "Recovery questions" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('tony')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #EA580C;">TR</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Tony</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "Cheer me up" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('priya')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #DB2777;">PS</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Priya</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "Feeling overwhelmed" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('robert')"
                class="flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #4F46E5;">RH</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Robert</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "Daily routine tips" %}</p>
            </div>
        </button>

        <button type="button" @click="prefillStarter('diane')"
                class="col-span-2 flex items-center gap-2 px-3 py-2.5 rounded-lg border cursor-pointer text-left transition-colors hover:opacity-80"
                style="border-color: var(--color-border); background: var(--color-surface);">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0" style="background-color: #0D9488;">DM</div>
            <div class="min-w-0">
                <p class="text-sm font-semibold" style="color: var(--color-text);">Diane</p>
                <p class="text-xs" style="color: var(--color-text-secondary);">{% trans "Just need to talk" %}</p>
            </div>
        </button>
    </div>

    <!-- Trust signal -->
    <p class="text-sm text-center" style="color: var(--color-text-secondary); opacity: 0.7;">
        {% trans "AI companions" %} &middot; {% trans "Your care team sees recovery insights only" %}
    </p>
</div>
