{% load humanize %}
{% load i18n %}
<!-- Support group message bubble — rendered inside Alpine x-for loop.
     `msg` is the current message object from sgMessages array. -->

<!-- Patient message (right-aligned, primary blue) -->
<template x-if="msg.type === 'user'">
    <div class="flex justify-end">
        <div class="max-w-[85%]">
            <template x-if="msg.channel === 'voice'">
                <div class="flex items-center justify-end gap-1.5 mb-1">
                    <i data-lucide="mic" class="w-3.5 h-3.5" style="color: var(--color-text-secondary);"></i>
                    <span class="text-xs" style="color: var(--color-text-secondary);">voice</span>
                </div>
            </template>

            <div class="px-4 py-2.5 text-white text-base leading-relaxed"
                 style="background-color: var(--color-primary); border-radius: 16px 16px 4px 16px;">
                <span x-text="msg.content"></span>
            </div>

            <div class="text-xs mt-1 text-right" style="color: var(--color-text-secondary);">
                <span x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})"></span>
            </div>
        </div>
    </div>
</template>

<!-- Persona message (left-aligned, warm surface, no border) -->
<template x-if="msg.type === 'persona'">
    <div class="flex justify-start">
        <div class="max-w-[85%]">
            <div class="flex items-center gap-2 mb-1">
                <!-- Avatar (tappable for profile card) -->
                <button type="button"
                        class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white flex-shrink-0 cursor-pointer transition-shadow focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
                        :style="'background-color: ' + msg.avatar_color"
                        :aria-label="'View ' + msg.persona_name + '\'s profile'"
                        @click="openProfileCard(msg.persona_id)">
                    <span x-text="msg.avatar_initials"></span>
                </button>
                <span class="text-sm font-semibold" style="color: var(--color-text);" x-text="msg.persona_name"></span>
            </div>

            <div class="relative ml-11 mb-1">
                <div class="px-4 py-2.5 text-base leading-relaxed"
                     style="background-color: var(--color-surface-warm);
                            color: var(--color-text);
                            border-radius: 16px 16px 16px 4px;"
                     :class="msg.reactions && msg.reactions.length > 0 ? 'pb-4' : ''">
                    <span x-text="msg.content"></span>
                </div>

                <!-- Reaction pills — overlapping bottom-right of bubble -->
                <template x-if="msg.reactions && msg.reactions.length > 0">
                    <div class="flex items-center gap-1 absolute -bottom-2.5 right-3">
                        <template x-for="reaction in msg.reactions" :key="reaction.persona_id + reaction.emoji">
                            <span class="inline-flex items-center gap-1 pl-0.5 pr-1.5 py-0.5 rounded-full shadow-sm border cursor-default"
                                  :title="reactionTooltip(reaction)"
                                  style="background: var(--color-surface); border-color: var(--color-border);">
                                <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-medium text-white flex-shrink-0"
                                      :style="'background-color: ' + ((window.__sgPersonas && window.__sgPersonas[reaction.persona_id]) ? window.__sgPersonas[reaction.persona_id].avatar_color : 'var(--color-text-secondary)')">
                                    <span x-text="(window.__sgPersonas && window.__sgPersonas[reaction.persona_id]) ? window.__sgPersonas[reaction.persona_id].avatar_initials : ''"></span>
                                </span>
                                <span class="text-sm leading-none" x-text="getEmoji(reaction.emoji)"></span>
                            </span>
                        </template>
                    </div>
                </template>
            </div>

            <div class="text-xs mt-1 ml-11" style="color: var(--color-text-secondary);">
                <span x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})"></span>
            </div>
        </div>
    </div>
</template>

<!-- Celebration banner -->
<template x-if="msg.type === 'celebration'">
    <div class="flex items-center justify-center gap-2 py-2 text-sm font-medium"
         style="color: #0D9488;">
        <i data-lucide="party-popper" class="w-4 h-4"></i>
        <span>{% trans "Milestone reached!" %}</span>
    </div>
</template>
