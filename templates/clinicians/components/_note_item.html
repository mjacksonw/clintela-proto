<!-- Single clinician note -->
<div class="p-2 rounded-md text-xs" style="background-color: var(--color-bg);">
    <div class="flex items-center justify-between mb-0.5">
        <span class="font-medium" style="color: var(--color-text);">{{ note.clinician.user.get_full_name }}</span>
        <span class="text-[10px]" style="color: var(--color-text-secondary);">{{ note.created_at|timesince }} ago</span>
    </div>
    <p style="color: var(--color-text);">{{ note.content }}</p>
    <span class="text-[10px] px-1.5 py-0.5 rounded-full mt-1 inline-block"
          style="background-color: var(--color-border); color: var(--color-text-secondary);">
        {{ note.get_note_type_display }}
    </span>
</div>
