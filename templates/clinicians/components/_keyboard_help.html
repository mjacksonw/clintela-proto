<!-- Keyboard shortcuts modal -->
<div x-show="showKeyboardHelp" x-transition.opacity
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
     @keydown.escape.window="showKeyboardHelp = false"
     x-cloak>
    <div class="card max-w-md w-full mx-4" style="padding: 24px;"
         @click.outside="showKeyboardHelp = false"
         role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-semibold" style="color: var(--color-text);">Keyboard Shortcuts</h2>
            <button @click="showKeyboardHelp = false" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800">
                <i data-lucide="x" class="w-4 h-4" style="color: var(--color-text-secondary);"></i>
            </button>
        </div>

        <div class="space-y-3 text-sm">
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Navigate patients</span>
                <div class="flex gap-1">
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">j</kbd>
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">k</kbd>
                </div>
            </div>
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Switch tabs</span>
                <div class="flex gap-1">
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">1</kbd>
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">2</kbd>
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">3</kbd>
                    <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">4</kbd>
                </div>
            </div>
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Acknowledge escalation</span>
                <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">e</kbd>
            </div>
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Focus search</span>
                <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">/</kbd>
            </div>
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Deselect patient / close</span>
                <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">Esc</kbd>
            </div>
            <div class="flex justify-between">
                <span style="color: var(--color-text-secondary);">Show this help</span>
                <kbd class="px-1.5 py-0.5 rounded text-xs font-mono border" style="border-color: var(--color-border);">?</kbd>
            </div>
        </div>
    </div>
</div>
