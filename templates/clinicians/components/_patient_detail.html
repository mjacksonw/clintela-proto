<!-- Patient detail container with tab bar -->
<div class="h-full flex flex-col">
    <!-- Tab bar -->
    <div role="tablist" class="flex border-b flex-shrink-0 px-1" style="border-color: var(--color-border);">
        <button role="tab"
                class="px-3 py-2.5 text-sm font-medium border-b-2 transition-colors"
                :class="activeTab === 'details' ? 'border-teal-500 text-teal-600' : 'border-transparent'"
                :style="activeTab !== 'details' ? 'color: var(--color-text-secondary)' : ''"
                @click="switchTab('details')"
                :aria-selected="activeTab === 'details'">
            Details
        </button>
        <button role="tab"
                class="px-3 py-2.5 text-sm font-medium border-b-2 transition-colors"
                :class="activeTab === 'care_plan' ? 'border-teal-500 text-teal-600' : 'border-transparent'"
                :style="activeTab !== 'care_plan' ? 'color: var(--color-text-secondary)' : ''"
                @click="switchTab('care_plan')"
                :aria-selected="activeTab === 'care_plan'">
            Care Plan
        </button>
        <button role="tab"
                class="px-3 py-2.5 text-sm font-medium border-b-2 transition-colors"
                :class="activeTab === 'research' ? 'border-teal-500 text-teal-600' : 'border-transparent'"
                :style="activeTab !== 'research' ? 'color: var(--color-text-secondary)' : ''"
                @click="switchTab('research')"
                :aria-selected="activeTab === 'research'">
            Research
        </button>
        <button role="tab"
                class="px-3 py-2.5 text-sm font-medium border-b-2 transition-colors"
                :class="activeTab === 'tools' ? 'border-teal-500 text-teal-600' : 'border-transparent'"
                :style="activeTab !== 'tools' ? 'color: var(--color-text-secondary)' : ''"
                @click="switchTab('tools')"
                :aria-selected="activeTab === 'tools'">
            Tools
        </button>
    </div>

    <!-- Tab content -->
    <div role="tabpanel" id="tab-content" class="flex-1 overflow-y-auto custom-scrollbar">
        <!-- Content loaded via HTMX -->
    </div>
</div>
