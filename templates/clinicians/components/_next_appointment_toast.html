<!-- Footer toast: next appointment — flex item (not fixed) so it doesn't overlap chat input.
     On mobile, hidden behind the fixed bottom nav; on desktop, visible as last flex row. -->
<div class="hidden lg:flex h-10 items-center justify-center text-xs border-t flex-shrink-0"
     style="background-color: var(--color-surface); border-color: var(--color-border); color: var(--color-text-secondary);">
    <i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5"></i>
    Next: <span class="font-medium ml-1" style="color: var(--color-text);">{{ next_appointment.get_appointment_type_display }}</span>
    with {{ next_appointment.patient.user.get_full_name }}
    at {{ next_appointment.scheduled_start|date:"g:i A" }}
</div>
